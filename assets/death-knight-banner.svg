<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pestsoul - Frozen Cyber Death Knight Banner</title>
  <desc id="desc">An icy fantasy cyber banner inspired by a frozen death knight scene, with a dark armored figure, frost blade, distant citadel, dragon silhouette, and Pestsoul title.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#031826"/>
      <stop offset="0.35" stop-color="#0A5264"/>
      <stop offset="0.62" stop-color="#63D6DB"/>
      <stop offset="1" stop-color="#05131E"/>
    </linearGradient>

    <radialGradient id="moonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(810 92) scale(430 245)">
      <stop stop-color="#E1FFFF" stop-opacity="0.86"/>
      <stop offset="0.32" stop-color="#6FE8EA" stop-opacity="0.44"/>
      <stop offset="0.72" stop-color="#0A5264" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#031826" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ice" x1="0" y1="305" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BDFBFF" stop-opacity="0.72"/>
      <stop offset="0.38" stop-color="#58C9D8" stop-opacity="0.54"/>
      <stop offset="1" stop-color="#082033" stop-opacity="0.95"/>
