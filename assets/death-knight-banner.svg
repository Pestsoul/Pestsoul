      <circle cx="72" cy="84" r="3" fill="#00FFB3" fill-opacity="0.16"/>
    </pattern>

    <linearGradient id="holoPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#CFFFFF" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#00FFB3" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#6A0DAD" stop-opacity="0.2"/>
    </linearGradient>

    <clipPath id="bannerClip">
      <rect width="1600" height="500" rx="0"/>
