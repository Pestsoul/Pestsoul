    <pattern id="circuit" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M12 24H42V12H78M42 24V54H72M18 78H48V60M72 54V84" stroke="#7DFFFF" stroke-opacity="0.14" stroke-width="2" fill="none"/>
