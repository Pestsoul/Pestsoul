    <linearGradient id="titleGrad" x1="476" y1="179" x2="1135" y2="291" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3FFFF"/>
      <stop offset="0.46" stop-color="#81F7FF"/>
      <stop offset="1" stop-color="#00FFB3"/>
    </linearGradient>

    <filter id="frostGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.06  0 0 0 0 0.9  0 0 0 0 1  0 0 0 0.78 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="deepShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#02080E" flood-opacity="0.72"/>
    </filter>

    <pattern id="snow" width="140" height="80" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="16" r="1.6" fill="#D7FFFF" fill-opacity="0.55"/>
      <circle cx="73" cy="31" r="1.2" fill="#D7FFFF" fill-opacity="0.35"/>
      <circle cx="118" cy="10" r="1" fill="#D7FFFF" fill-opacity="0.45"/>
      <circle cx="42" cy="68" r="1.3" fill="#D7FFFF" fill-opacity="0.32"/>
      <path d="M104 58L112 62" stroke="#D7FFFF" stroke-opacity="0.3" stroke-width="1"/>
